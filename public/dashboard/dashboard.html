<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Dashboard</title>
        <link rel="stylesheet" href="dashboard.css">
    </head>
    <body>
        <div class="page">
            <div class="left-column">
                <h2>Test a strategy...</h2>
                <div class="backtest-form">
                    <label>Strategy:
                        <select id="strategy-select">
                            <option value="">-- Select --</option>
                        </select>
                    </label>
                    <label>Stock:
                        <select id="stock-select">
                            <option value="">-- Select --</option>
                        </select>
                    </label>
                    <label>Hold position for <input type="number" id="position-days" min="1"> days</label>
                </div>
                <button id="test-strategy-btn">Test Strategy</button>
                <hr>
                <h2>Results</h2>
                    <p id="backtest-result">Run backtest to see results</p>
                <hr>
                <h2>Save Results</h2>
                <div class="backtest-form">
                    <label>Name:
                        <input type="text" id="result-name" placeholder="Enter a name">
                    </label>
                    <label>Description:
                        <input type="text" id="result-description" readonly>
                    </label>
                    <label class="notes-label">Notes:
                        <textarea id="result-notes" maxlength="200" placeholder="Optional notes..."></textarea>
                    </label>
                </div>
                <button id="save-result-btn">Save Result</button>
                <p id="save-status"></p>
            </div>
            <div class="right-column">
                <div class="welcome">
                    <h2 id="welcome-heading">Welcome, </h2>
                </div>
                <div class="strategies">
                    <h2>Strategies</h2>
                    <ul id="strategy-list"></ul>
                </div>
                <div class="stocks">
                    <h2>Stocks</h2>
                    <ul id="stock-list"></ul>
                </div>
                <div class="results">
                    <h2>Results</h2>
                    <ul id="results-list"></ul>
                </div>
            </div>

        </div>
    <div id="result-modal" class="modal-overlay" hidden>
        <div class="modal-box">
            <h3 id="modal-name"></h3>
            <p><strong>Strategy:</strong> <span id="modal-strategy"></span></p>
            <p><strong>Description:</strong> <span id="modal-description"></span></p>
            <p><strong>Notes:</strong> <span id="modal-notes"></span></p>
            <div class="modal-actions">
                <button id="modal-delete-btn" class="btn-danger">Delete</button>
                <button id="modal-close-btn">Close</button>
            </div>
        </div>
    </div>
    <script type="module" src="dashboard.js"></script>
    <script type="module" src="backtesting.js"></script>
    </body>
</html>
